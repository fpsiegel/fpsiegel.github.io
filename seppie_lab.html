<script>
function refresh(node)
{
   var times = 10000; // gap in Milli Seconds;

   (function startRefresh()
   {
      var address;
      if(node.src.indexOf('?')>-1)
       address = node.src.split('?')[0];
      else 
       address = node.src;
      node.src = address+"?time="+new Date().getTime();

      setTimeout(startRefresh,times);
   })();

}

window.onload = function()
{
  var node = document.getElementById('img');
  refresh(node);
  // you can refresh as many images you want just repeat above steps
}
function myFunction() {
    alert('This is a picture of the Seppie Lab taken a second ago by a pi3 camera. It is then stored onto a local Apache2 server hosted on a headless raspberry pi3 computer. Then, the github hosted website you are on grabbed the picture from the previously mentionned server and showed it to you ! And this should happens every second !(depending on your connection and browser)');
}
function myFunction2() {
    alert('It might be that the shop is closed and we have turned off the devices bringing the live view to you, or that the basic I.O.T. system that we have put in place has stop functionning for mysterious reasons. Both ways, we are very sorry for the inconvenience!');
}
