<head>
	<link rel="shortcut icon" href="images/logo_seppie.jpg">
	<title> The Seppie Lab </title>
	<meta charset="UTF-8">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
html,body,h1,h2,h3,h4,h5 {font-family: "Raleway", sans-serif}
img {
    max-width: 100%;
    max-height: 100%;
    height: auto;
    width: auto\9; /* ie8 */
}
#example {
   position: absolute;
   top: 10px;
   left: 10px; 
</style>
<script>
function refresh(node)
{
   var times = 1000; // gap in Milli Seconds;

   (function startRefresh()
   {
      var address;
      if(node.src.indexOf('?')>-1)
       address = node.src.split('?')[0];
      else 
       address = node.src;
      node.src = address+"?time="+new Date().getTime();

      setTimeout(startRefresh,times);
   })();

}

window.onload = function()
{
  var node = document.getElementById('img');
  refresh(node);
  // you can refresh as many images you want just repeat above steps
}
function myFunction() {
    alert('This is a picture of the Seppie Lab taken a second ago by a pi3 camera. It is then stored onto a local Apache2 server hosted on a headless raspberry pi3 computer. Then, the github hosted website you are on grabbed the picture from the previously mentionned server and showed it to you ! And this should happens every second !(depending on your connection and browser)');
}

</script>
</head>

	<body class="w3-light-grey" >
<div id="example">
<h1> The Seppie Lab </h1>
<button onclick="setTimeout(myFunction, 500);">What am I seeing ?</button>
</div>
<img id="img" src="http://79.22.88.198/seppie_window/sw.jpg" alt="Seppie window">


<br>
</body>
